services:
  - type: web
    name: whatsapp-bot-juizado
    runtime: node
    plan: standard
    region: sfo
    
    # Build commands
    buildCommand: npm install
    startCommand: npm start
    
    # Environment variables for production
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NODE_OPTIONS
        value: --max-old-space-size=392
    
    # Memory and CPU
    numInstances: 1
    scaling:
      minInstances: 1
      maxInstances: 1
    
    # Health checks
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10
    healthCheckStartupFailureThresholdCount: 3
    
    # Auto-deploy on git push
    autoDeploy: true
    
    # Build filter
    buildFilter:
      paths:
        - src/**
        - robo.js
        - package.json
        - package-lock.json
